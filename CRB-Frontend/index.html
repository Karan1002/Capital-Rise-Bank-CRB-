<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CRB Login System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            width: 100%;
            display: flex;
            background: linear-gradient(135deg, #002d6b, #005bb5);
            color: #fff;
        }

        /* Left Panel */
        .left-panel {
            width: 55%;
            background: url('https://img.freepik.com/free-vector/mobile-banking-isometric-illustration-smartphone-isolated-white-background-concept-online-shopping-money-transfer-internet-payments-e-commerce_115739-1641.jpg') no-repeat center;
            background-size: cover;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 50px;
            color: #fff;
        }

        .left-panel h1 {
            font-size: 36px;
            line-height: 44px;
            text-shadow: 2px 3px 6px rgba(0, 0, 0, 0.4);
            text-align: center;
        }

        /* Right Login|Register Panel */
        .right-panel {
            width: 45%;
            background: rgba(255, 255, 255, 0.98);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
        }

        .modal {
            width: 90%;
            max-width: 350px;
            color: #003366;
            display: none;
            animation: fade 0.4s ease;
        }

        @keyframes fade {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .active {
            display: block;
        }

        h2 {
            text-align: center;
            margin-bottom: 18px;
            color: #005bb5;
        }

        .input-box {
            position: relative;
            margin-bottom: 18px;
        }

        input {
            width: 100%;
            padding: 12px 44px 12px 14px;
            border-radius: 10px;
            border: 2px solid #ccd9f2;
            font-size: 1rem;
        }

        .eye {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #555;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            background: #ffcc00;
            border-radius: 10px;
            margin-top: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        button:hover {
            background: #ffe076;
        }

        .switch {
            margin-top: 12px;
            text-align: center;
        }

        .switch a {
            color: #005bb5;
            cursor: pointer;
            font-weight: 600;
        }
    </style>
</head>

<body>

    <!-- LEFT SIDE SECURE BANKING INTRO -->
    <div class="left-panel">
        <h1>Welcome to<br>CRB Smart Banking<br><small style="font-size:17px;font-weight:400;">Fast • Secure •
                Trusted</small></h1>
    </div>

    <!-- RIGHT SIDE LOGIN & REGISTER -->
    <div class="right-panel">

        <div id="loginModal" class="modal active">
            <h2>🔐 Login</h2>
            <form id="loginForm">
                <div class="input-box">
                    <input type="text" id="loginUsername" placeholder="Username" required>
                </div>
                <div class="input-box">
                    <input type="password" id="loginPassword" placeholder="Password" required>
                    <i class="fa-solid fa-eye eye" id="loginEye"></i>
                </div>
                <button type="submit">Login</button>
                <p class="switch">New User? <a id="toRegister">Register Now</a></p>
            </form>
        </div>

        <div id="registerModal" class="modal">
            <h2>📝 Register</h2>
            <form id="registerForm">
                <div class="input-box">
                    <input type="text" id="registerName" placeholder="Full Name" required>
                </div>
                <div class="input-box">
                    <input type="email" id="registerEmail" placeholder="Email" required>
                </div>
                <div class="input-box">
                    <input type="password" id="registerPassword" placeholder="Create Password" required>
                    <i class="fa-solid fa-eye eye" id="registerEye"></i>
                </div>
                <button type="submit">Register</button>
                <p class="switch">Already a user? <a id="toLogin">Login Here</a></p>
            </form>
        </div>

    </div>
    <script>
        const API_BASE = 'http://localhost:5000/api';

        function trackUserLogin(userData, type) {
            console.log('✅ User logged in:', userData, type);
        }

        function trackAdminLogin(adminName) {
            console.log('👨‍💼 Admin logged in:', adminName);
        }

        const loginModal = document.getElementById("loginModal");
        const registerModal = document.getElementById("registerModal");

        // Modal switching
        document.getElementById("toRegister").onclick = () => {
            loginModal.classList.remove("active");
            registerModal.classList.add("active");
        };

        document.getElementById("toLogin").onclick = () => {
            registerModal.classList.remove("active");
            loginModal.classList.add("active");
        };

        // ✅ FIXED REGISTER FORM
        document.getElementById('registerForm').onsubmit = async function (e) {
            e.preventDefault();

            const name = document.getElementById('registerName').value.trim();
            const email = document.getElementById('registerEmail').value.trim();
            const password = document.getElementById('registerPassword').value;

            // Basic validation
            if (!name || !email || !password || password.length < 4) {
                alert('❌ Name, email aur minimum 4 char password daalo!');
                return;
            }

            const userData = { name, email, password };

            try {
                const res = await fetch(`${API_BASE}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(userData)
                });

                const data = await res.json();

                if (data.success) {
                    alert('✅ Registration successful! Ab same email/password se login karo');
                    trackUserLogin(data.user, 'user');
                    registerModal.classList.remove('active');
                    loginModal.classList.add('active');
                    document.getElementById('registerForm').reset();
                } else {
                    alert('❌ ' + data.message);
                }
            } catch (err) {
                console.error('Registration error:', err);
                alert('❌ Server error! Backend chal raha? (node server.js)');
            }
        };

        // ✅ FIXED LOGIN FORM - Exact password matching
        document.getElementById('loginForm').onsubmit = async function (e) {
            e.preventDefault();

            const email = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value; // EXACT password, no trim!

            console.log('🔍 Login attempt:', email); // DEBUG

            // Admin fallback
            if (email === "Karan" && password === "Karan@12345") {
                trackAdminLogin("Karan");
                localStorage.setItem("lndbCurrentAdmin", "Karan");
                window.location.href = "admin.html";
                return;
            }

            try {
                const res = await fetch(`${API_BASE}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: email.toLowerCase(),  // Case insensitive
                        password: password  // EXACT password string
                    })
                });

                const data = await res.json();
                console.log('🔍 Server response:', data); // DEBUG

                if (data.success) {
                    trackUserLogin(data.user, 'user');
                    localStorage.setItem('lndbCurrentUser', JSON.stringify(data.user));
                    window.location.href = 'userpage.html';
                } else {
                    alert('❌ ' + data.message + '\n💡 Tip: Exact same password use karo jo register kiya tha!');
                }
            } catch (err) {
                console.error('Login error:', err);
                alert('❌ Server error! Backend check karo');
            }
        };

        // Password eye toggle
        function toggleEye(eyeId, inputId) {
            const eye = document.getElementById(eyeId);
            const input = document.getElementById(inputId);

            eye.onclick = () => {
                if (input.type === "password") {
                    input.type = "text";
                    eye.classList.replace("fa-eye", "fa-eye-slash");
                } else {
                    input.type = "password";
                    eye.classList.replace("fa-eye-slash", "fa-eye");
                }
            };
        }

        toggleEye("loginEye", "loginPassword");
        toggleEye("registerEye", "registerPassword");
    </script>




</body>

</html>
