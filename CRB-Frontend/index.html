<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CRB Login System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            width: 100%;
            display: flex;
            background: linear-gradient(135deg, #002d6b, #005bb5);
            color: #fff;
        }

        .left-panel {
            width: 55%;
            background: url('https://img.freepik.com/free-vector/mobile-banking-isometric-illustration-smartphone-isolated-white-background-concept-online-shopping-money-transfer-internet-payments-e-commerce_115739-1641.jpg') no-repeat center;
            background-size: cover;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 50px;
            color: #fff;
        }

        .left-panel h1 {
            font-size: 36px;
            line-height: 44px;
            text-shadow: 2px 3px 6px rgba(0, 0, 0, 0.4);
            text-align: center;
        }

        .right-panel {
            width: 45%;
            background: rgba(255, 255, 255, 0.98);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
        }

        .modal {
            width: 90%;
            max-width: 350px;
            color: #003366;
            display: none;
            animation: fade 0.4s ease;
        }

        @keyframes fade {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .active {
            display: block;
        }

        h2 {
            text-align: center;
            margin-bottom: 18px;
            color: #005bb5;
        }

        .input-box {
            position: relative;
            margin-bottom: 18px;
        }

        input {
            width: 100%;
            padding: 12px 44px 12px 14px;
            border-radius: 10px;
            border: 2px solid #ccd9f2;
            font-size: 1rem;
        }

        .eye {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #555;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            background: #ffcc00;
            border-radius: 10px;
            margin-top: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        button:hover {
            background: #ffe076;
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .switch {
            margin-top: 12px;
            text-align: center;
        }

        .switch a {
            color: #005bb5;
            cursor: pointer;
            font-weight: 600;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #ffcc00;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="left-panel">
        <h1>Welcome to<br>CRB Smart Banking<br><small style="font-size:17px;font-weight:400;">Fast • Secure •
                Trusted</small></h1>
    </div>

    <div class="right-panel">
        <div id="loginModal" class="modal active">
            <h2>🔐 Login</h2>
            <form id="loginForm">
                <div class="input-box">
                    <input type="email" id="loginEmail" placeholder="Email" required>
                </div>
                <div class="input-box">
                    <input type="password" id="loginPassword" placeholder="Password" required>
                    <i class="fa-solid fa-eye eye" id="loginEye"></i>
                </div>
                <button type="submit" id="loginBtn">Login</button>
                <p class="switch">New User? <a id="toRegister">Register Now</a></p>
            </form>
        </div>

        <div id="registerModal" class="modal">
            <h2>📝 Register</h2>
            <form id="registerForm">
                <div class="input-box">
                    <input type="text" id="registerName" placeholder="Full Name" required>
                </div>
                <div class="input-box">
                    <input type="email" id="registerEmail" placeholder="Email" required>
                </div>
                <div class="input-box">
                    <input type="password" id="registerPassword" placeholder="Create Password (6+ chars)" required>
                    <i class="fa-solid fa-eye eye" id="registerEye"></i>
                </div>
                <button type="submit" id="registerBtn">Register</button>
                <p class="switch">Already a user? <a id="toLogin">Login Here</a></p>
            </form>
        </div>
    </div>

    <script>
        const API_BASE = 'https://capital-rise-bank-crb-1.onrender.com/api';

        const REGISTER_ENDPOINT = `${API_BASE}/auth/register`;
        const LOGIN_ENDPOINT = `${API_BASE}/auth/login`;

        function trackUserLogin(userData, type) {
            console.log('✅ User logged in:', userData, type);
        }

        function trackAdminLogin(adminName) {
            console.log('👨‍💼 Admin logged in:', adminName);
        }

        const loginModal = document.getElementById("loginModal");
        const registerModal = document.getElementById("registerModal");

        // Modal switching
        document.getElementById("toRegister").onclick = () => {
            loginModal.classList.remove("active");
            registerModal.classList.add("active");
        };

        document.getElementById("toLogin").onclick = () => {
            registerModal.classList.remove("active");
            loginModal.classList.add("active");
        };

        function setLoading(button, isLoading) {
            const btn = button;
            if (isLoading) {
                btn.disabled = true;
                btn.innerHTML = '<span class="loading"></span>Processing...';
            } else {
                btn.disabled = false;
                btn.textContent = btn.id === 'registerBtn' ? 'Register' : 'Login';
            }
        }

        document.getElementById('registerForm').onsubmit = async function (e) {
            e.preventDefault();

            const name = document.getElementById('registerName').value.trim();
            const email = document.getElementById('registerEmail').value.trim();
            const password = document.getElementById('registerPassword').value;

            if (!name || !email || !password || password.length < 6) {
                alert(' Please enter name, valid email, and 6+ characters password!');
                return;
            }

            const registerBtn = document.getElementById('registerBtn');
            setLoading(registerBtn, true);

            try {
                console.log(' Registering:', { name, email });

                const res = await fetch(REGISTER_ENDPOINT, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });

                const data = await res.json();
                console.log('Register response:', data);

                if (data.success) {
                    alert('Registration successful! Ab login karo');
                    trackUserLogin(data.user, 'user');
                    registerModal.classList.remove('active');
                    loginModal.classList.add('active');
                    document.getElementById('registerForm').reset();
                    document.getElementById('loginEmail').value = email;
                } else {
                    alert('' + (data.message || 'Registration failed'));
                }
            } catch (err) {
                console.error('Register error:', err);
                alert('Server error!');
            } finally {
                setLoading(registerBtn, false);
            }
        };

        document.getElementById('loginForm').onsubmit = async function (e) {
            e.preventDefault();

            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;

            console.log('🔍 Login attempt:', email);

            if (email === "karan@admin.gmail" && password === "Karan@12345") {
                trackAdminLogin("Karan");
                localStorage.setItem("lndbCurrentAdmin", "Karan");
                window.location.href = "admin.html";
                return;
            }

            const loginBtn = document.getElementById('loginBtn');
            setLoading(loginBtn, true);

            try {
                const res = await fetch(LOGIN_ENDPOINT, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email.toLowerCase(), password })
                });

                const data = await res.json();
                console.log('🔍 Server response:', data);

                if (data.success) {
                    trackUserLogin(data.user, 'user');
                    localStorage.setItem('lndbCurrentUser', JSON.stringify(data.user));
                    window.location.href = 'userpage.html';
                } else {
                    alert('❌ ' + (data.message || 'Login failed') + '\n💡 Tip: Same password use karo!');
                }
            } catch (err) {
                console.error('❌ Login error:', err);
                console.error('❌ Login error:', err);
            } finally {
                setLoading(loginBtn, false);
            }
        };

        // Password eye toggle
        function toggleEye(eyeId, inputId) {
            const eye = document.getElementById(eyeId);
            const input = document.getElementById(inputId);

            eye.onclick = () => {
                if (input.type === "password") {
                    input.type = "text";
                    eye.classList.replace("fa-eye", "fa-eye-slash");
                } else {
                    input.type = "password";
                    eye.classList.replace("fa-eye-slash", "fa-eye");
                }
            };
        }

        toggleEye("loginEye", "loginPassword");
        toggleEye("registerEye", "registerPassword");
    </script>
</body>

</html>
